<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1600" viewBox="0 0 800 1600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f18"/>
      <stop offset="30%" stop-color="#141c28"/>
      <stop offset="58%" stop-color="#221d22"/>
      <stop offset="80%" stop-color="#2b2420"/>
      <stop offset="100%" stop-color="#332a22"/>
    </linearGradient>

    <linearGradient id="dune1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1712"/>
      <stop offset="100%" stop-color="#100d0a"/>
    </linearGradient>
    <linearGradient id="dune2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#120f0c"/>
      <stop offset="100%" stop-color="#0a0806"/>
    </linearGradient>

    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8b878" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#e8b878" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hazeWarm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8a6a4a" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#8a6a4a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hazeCool" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3f5268" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3f5268" stop-opacity="0"/>
    </radialGradient>
    <filter id="soften" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>

    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.018" numOctaves="4" seed="11" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="
        0 0 0 0 0.5
        0 0 0 0 0.44
        0 0 0 0 0.38
        0 0 0 0.4 0"/>
    </filter>

    <filter id="fineGrain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="4"/>
    </filter>
  </defs>

  <rect width="800" height="1600" fill="url(#sky)"/>

  <g filter="url(#soften)">
    <ellipse cx="560" cy="380" rx="280" ry="200" fill="url(#sunGlow)"/>
    <ellipse cx="150" cy="560" rx="320" ry="240" fill="url(#hazeCool)"/>
    <ellipse cx="480" cy="960" rx="420" ry="300" fill="url(#hazeWarm)"/>
    <ellipse cx="640" cy="1300" rx="320" ry="260" fill="url(#hazeCool)"/>
  </g>

  <path d="M0,1460 Q160,1400 320,1435 T640,1420 Q740,1410 800,1430 L800,1600 L0,1600 Z" fill="url(#dune1)"/>
  <path d="M0,1530 Q220,1480 420,1510 T800,1500 L800,1600 L0,1600 Z" fill="url(#dune2)"/>

  <rect width="800" height="1600" filter="url(#grain)" opacity="0.45"/>
  <rect width="800" height="1600" filter="url(#fineGrain)" opacity="0.04" style="mix-blend-mode:overlay"/>
</svg>
